<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Chat Quiz</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- MATRIX INTRO -->
<canvas id="matrix"></canvas>

<div class="app">

    <!-- NAME INPUT SCREEN -->
    <div class="screen active" id="q0">
        <h2>Enter your name</h2>
        <input type="text" id="username" placeholder="Your name" required>
        <button onclick="saveName()">Next</button>
    </div>

    <!-- QUESTION 1 -->
    <div class="screen" id="q1">
        <h2>Do you think I am cute?</h2>
        <button onclick="saveAns('cute','Yes','q2')">Yes</button>
        <button onclick="saveAns('cute','No','q2')">No</button>
    </div>

    <!-- QUESTION 2 -->
    <div class="screen" id="q2">
        <h2>Do you enjoy talking to me?</h2>
        <button onclick="saveAns('talk','Yes','q3')">Yes</button>
        <button onclick="saveAns('talk','No','q3')">No</button>
    </div>

    <!-- QUESTION 3 -->
    <div class="screen" id="q3">
        <h2>What am I to you?</h2>
        <input id="relation" list="suggestions" placeholder="Choose or type..." required>
        <datalist id="suggestions">
            <option value="Friend">
            <option value="Best Friend">
            <option value="Brother/Sister">
            <option value="Crush">
            <option value="Lover">
            <option value="Special Person">
            <option value="Family">
            <option value="Just Someone">
        </datalist>
        <button onclick="saveInput('relation','q4')">Next</button>
    </div>

    <!-- QUESTION 4 -->
    <div class="screen" id="q4">
        <h2>Do I make your day better?</h2>
        <button onclick="saveAns('day','Yes','q5')">Yes</button>
        <button onclick="saveAns('day','No','q5')">No</button>
    </div>

    <!-- QUESTION 5 -->
    <div class="screen" id="q5">
        <h2>What do you expect from me?</h2>
        <form id="quizForm" onsubmit="submitForm(event)">
            <label><input type="checkbox" name="expectations" value="Love"> Love</label>
            <label><input type="checkbox" name="expectations" value="Care"> Care</label>
            <label><input type="checkbox" name="expectations" value="Trust"> Trust</label>
            <label><input type="checkbox" name="expectations" value="Honesty"> Honesty</label>
            <label><input type="checkbox" name="expectations" value="Time"> Time</label>
            <label><input type="checkbox" name="expectations" value="Respect"> Respect</label>
            <button type="submit">Submit</button>
        </form>
    </div>

    <!-- THANK YOU SCREEN -->
    <div class="screen" id="end">
        <h2>💖 Thanks for playing!</h2>
        <p>Just for fun 😄</p>
    </div>

</div>

<canvas id="confetti"></canvas>

<script src="script.js"></script>
</body>
</html>
