<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html><head>
  <title>Interactive Heart Graph</title>

    
    
  <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        canvas {
            border: 1px solid #ccc;
        }
        .controls {
            margin-top: 10px;
        }
        button {
            margin: 5px;
            padding: 5px 10px;
        }
    </style>
</head><body>

<h2 style="text-decoration: underline;">Interactive Heart Graph</h2>


<canvas id="canvas" width="500" height="500"></canvas>

<div class="controls">
    Speed:
    <input id="speed" min="1" max="100" value="20" type="range">
    <br>
    <button onclick="pause()">Pause</button>
    <button onclick="resume()">Resume</button>
    <button onclick="restart()">Restart</button>
</div>


<p>
<b>Equation:</b><br>
x = 16 sin³(t)<br>
y = 13 cos(t) &#8722; 5 cos(2t) &#8722; 2 cos(3t) &#8722; cos(4t)
</p>


<p>
<b>How it works:</b><br>
We vary t from 0 to 2&#960;. For each t:<br>
x = f(t), y = g(t) &#8594; plot (x, y).<br>
This is called a <b>parametric equation</b>.
</p>


<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let t = 0;
let running = true;

// Draw grid + axes + labels
function drawGrid() {
    ctx.save();
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.translate(250, 250);
    ctx.scale(10, -10);

    // Grid
    ctx.strokeStyle = "#eee";
    ctx.lineWidth = 0.05;

    for (let i = -25; i <= 25; i++) {
        ctx.beginPath();
        ctx.moveTo(i, -25);
        ctx.lineTo(i, 25);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-25, i);
        ctx.lineTo(25, i);
        ctx.stroke();
    }

    // Axes
    ctx.strokeStyle = "black";
    ctx.lineWidth = 0.2;

    ctx.beginPath();
    ctx.moveTo(-25, 0);
    ctx.lineTo(25, 0);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, -25);
    ctx.lineTo(0, 25);
    ctx.stroke();

    // Numbers (reset transform for text)
    ctx.restore();
    ctx.save();

    ctx.fillStyle = "black";
    ctx.font = "10px Arial";

    for (let i = -20; i <= 20; i += 5) {
        // x-axis numbers
        ctx.fillText(i, 250 + i * 10, 260);

        // y-axis numbers
        ctx.fillText(i, 260, 250 - i * 10);
    }

    // Axis labels
    ctx.fillText("X", 480, 260);
    ctx.fillText("Y", 260, 20);

    ctx.restore();
}

// Draw heart + moving point
function drawHeart() {
    if (!running) {
        requestAnimationFrame(drawHeart);
        return;
    }

    drawGrid();

    ctx.save();
    ctx.translate(250, 250);
    ctx.scale(10, -10);

    ctx.beginPath();

    let tempT = 0;
    let currentX = 0;
    let currentY = 0;

    while (tempT < t) {
        let x = 16 * Math.pow(Math.sin(tempT), 3);
        let y = 13 * Math.cos(tempT)
              - 5 * Math.cos(2 * tempT)
              - 2 * Math.cos(3 * tempT)
              - Math.cos(4 * tempT);

        if (tempT === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);

        currentX = x;
        currentY = y;

        tempT += 0.01;
    }

    // Draw curve
    ctx.strokeStyle = "red";
    ctx.lineWidth = 0.2;
    ctx.stroke();

    // Draw moving point
    ctx.beginPath();
    ctx.arc(currentX, currentY, 0.5, 0, Math.PI * 2);
    ctx.fillStyle = "blue";
    ctx.fill();

    ctx.restore();

    // Speed control
    let speed = document.getElementById("speed").value;
    t += speed * 0.002;

    if (t > Math.PI * 2) t = Math.PI * 2;

    requestAnimationFrame(drawHeart);
}

// Controls
function pause() { running = false; }
function resume() { running = true; }
function restart() { t = 0; running = true; }

// Start
drawHeart();
</script>

</body></html>
