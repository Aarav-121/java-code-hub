<!DOCTYPE html>
<html>
<head>
    <title>Responsive Heart Graph</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin: 0;
            padding: 10px;
        }

        canvas {
            border: 1px solid #ccc;
            width: 90vw;
            height: 90vw;
            max-width: 500px;
            max-height: 500px;
        }

        .controls {
            margin-top: 10px;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            font-size: 16px;
        }

        input[type="range"] {
            width: 80%;
        }
    </style>
</head>

<body>

<h2>❤️ Interactive Heart Graph</h2>

<canvas id="canvas"></canvas>

<div class="controls">
    Speed:<br>
    <input id="speed" type="range" min="1" max="100" value="20">
    <br>
    <button onclick="pause()">Pause</button>
    <button onclick="resume()">Resume</button>
    <button onclick="restart()">Restart</button>
</div>

<p>
<b>Equation:</b><br>
x = 16 sin³(t)<br>
y = 13 cos(t) − 5 cos(2t) − 2 cos(3t) − cos(4t)
</p>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let t = 0;
let running = true;

// Resize canvas dynamically
function resizeCanvas() {
    const size = Math.min(window.innerWidth * 0.9, 500);
    canvas.width = size;
    canvas.height = size;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function drawGrid(scale, center) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(center, center);
    ctx.scale(scale, -scale);

    ctx.strokeStyle = "#eee";
    ctx.lineWidth = 0.05;

    for (let i = -25; i <= 25; i++) {
        ctx.beginPath();
        ctx.moveTo(i, -25);
        ctx.lineTo(i, 25);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(-25, i);
        ctx.lineTo(25, i);
        ctx.stroke();
    }

    ctx.strokeStyle = "black";
    ctx.lineWidth = 0.2;

    ctx.beginPath();
    ctx.moveTo(-25, 0);
    ctx.lineTo(25, 0);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, -25);
    ctx.lineTo(0, 25);
    ctx.stroke();

    ctx.restore();
}

function drawHeart() {
    if (!running) {
        requestAnimationFrame(drawHeart);
        return;
    }

    const center = canvas.width / 2;
    const scale = canvas.width / 50;

    drawGrid(scale, center);

    ctx.save();
    ctx.translate(center, center);
    ctx.scale(scale, -scale);

    ctx.beginPath();

    let tempT = 0;
    let currentX = 0;
    let currentY = 0;

    while (tempT < t) {
        let x = 16 * Math.pow(Math.sin(tempT), 3);
        let y = 13 * Math.cos(tempT)
              - 5 * Math.cos(2 * tempT)
              - 2 * Math.cos(3 * tempT)
              - Math.cos(4 * tempT);

        if (tempT === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);

        currentX = x;
        currentY = y;

        tempT += 0.01;
    }

    ctx.strokeStyle = "red";
    ctx.lineWidth = 0.2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(currentX, currentY, 0.5, 0, Math.PI * 2);
    ctx.fillStyle = "blue";
    ctx.fill();

    ctx.restore();

    let speed = document.getElementById("speed").value;
    t += speed * 0.002;

    if (t > Math.PI * 2) t = Math.PI * 2;

    requestAnimationFrame(drawHeart);
}

function pause() { running = false; }
function resume() { running = true; }
function restart() { t = 0; running = true; }

drawHeart();
</script>

</body>
</html>
