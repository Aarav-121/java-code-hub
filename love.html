<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Little Surprise ❤️</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
    height: 100vh;
  }
  canvas { display: block; }
  #buttons {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, 150px);
    width: max-content;
  }
  #yes {
    background: #ff4d4d;
    color: white;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    position: relative;
  }
  #no {
    background: gray;
    color: white;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    position: absolute; /* fixed for hover movement */
    top: 0;
    left: 120px;
  }
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>
<div id="buttons">
  <button id="yes">Yes ❤️</button>
  <button id="no">No</button>
</div>

<script>
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const columns = Math.floor(canvas.width / 10);
const drops = Array(columns).fill(0);

const messages = [
  "Hey elder one,",
  "You might not realize it always,",
  "but you mean a lot to me.",
  "Your guidance and support mean a lot to me,",
  "and I am truly grateful to have you in my life.",
  "Thank you for being someone I can always look up to❤️"
];

let showAnimation = false;
let currentLine = 0;
let currentChar = 0;
let lastUpdate = Date.now();

const yesBtn = document.getElementById('yes');
const noBtn = document.getElementById('no');

// Yes button triggers animation
yesBtn.onclick = () => {
  showAnimation = true;
  document.getElementById('buttons').style.display = 'none';
};

// No button moves randomly on hover
noBtn.onmouseenter = () => {
  const maxX = window.innerWidth - noBtn.offsetWidth;
  const maxY = window.innerHeight - noBtn.offsetHeight;
  const x = Math.random() * maxX;
  const y = Math.random() * maxY;
  noBtn.style.left = `${x}px`;
  noBtn.style.top = `${y}px`;
};

// Draw heart
function drawHeart(x, y, size) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(size, size);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.bezierCurveTo(-25, -25, -50, 15, 0, 50);
  ctx.bezierCurveTo(50, 15, 25, -25, 0, 0);
  ctx.fillStyle = 'red';
  ctx.fill();
  ctx.restore();
}

// Draw messages
function drawMessages() {
  ctx.font = '20px Arial';
  let startY = canvas.height / 2 + 100;
  for (let i = 0; i < currentLine; i++) {
    ctx.fillText(messages[i], canvas.width/2 - 220, startY + i*30);
  }
  if (currentLine < messages.length) {
    ctx.fillText(messages[currentLine].substring(0, currentChar), canvas.width/2 - 220, startY + currentLine*30);
    const now = Date.now();
    if (now - lastUpdate > 60) {
      lastUpdate = now;
      if (currentChar < messages[currentLine].length) {
        currentChar++;
      } else {
        currentLine++;
        currentChar = 0;
      }
    }
  }
}

// Main animation loop
let heartSize = 2;
let heartGrowing = true;
function draw() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!showAnimation) {
    ctx.fillStyle = 'white';
    ctx.font = '26px Arial';
    ctx.fillText('Do you love me ❤️?', canvas.width/2 - 200, canvas.height/2);
  } else {
    // Matrix numbers
    ctx.fillStyle = '#0F0';
    ctx.font = '14px monospace';
    for (let i = 0; i < drops.length; i++) {
      const text = Math.floor(Math.random()*10);
      ctx.fillText(text, i*10, drops[i]);
      drops[i] += 14;
      if (drops[i] > canvas.height) drops[i] = 0;
    }

    // Heart animation
    if (heartGrowing) heartSize += 0.005;
    else heartSize -= 0.005;
    if (heartSize > 2.2) heartGrowing = false;
    if (heartSize < 1.8) heartGrowing = true;
    drawHeart(canvas.width/2, canvas.height/2 - 50, heartSize);

    // Messages
    ctx.fillStyle = 'white';
    drawMessages();
  }

  requestAnimationFrame(draw);
}

draw();

// Resize handler
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
