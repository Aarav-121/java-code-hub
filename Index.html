<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fun Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <div class="header">💬 Fun Chat</div>

    <!-- MATRIX INTRO -->
    <canvas id="matrix"></canvas>

    <!-- QUESTIONS FLOW -->

    <!-- Q0: Name -->
    <div class="screen active" id="q0">
        <h2>What's your name?</h2>
        <input type="text" id="username" placeholder="Enter your name" required>
        <button id="q0Next">Next</button>
    </div>

    <!-- Q1 -->
    <div class="screen" id="q1">
        <h2>Do you think I am cute?</h2>
        <button onclick="nextQ('q2')">Yes</button>
        <button onclick="nextQ('q2')">No</button>
    </div>

    <!-- Q2 -->
    <div class="screen" id="q2">
        <h2>Do you enjoy talking to me?</h2>
        <button onclick="saveAns('talk','Yes','q3')">Yes</button>
        <button onclick="saveAns('talk','No','q3')">No</button>
    </div>

    <!-- Q3: Relation -->
    <div class="screen" id="q3">
        <h2>What am I to you?</h2>
        <input 
            id="relation" 
            list="suggestions" 
            placeholder="Choose or type..." 
            required
        >
        <datalist id="suggestions">
            <option value="Friend">
            <option value="Best Friend">
            <option value="Brother/Sister">
            <option value="Crush">
            <option value="Lover">
            <option value="Special Person">
            <option value="Family">
            <option value="Just Someone">
        </datalist>
        <button type="button" id="q3Next">Next</button>
    </div>

    <!-- Q4 -->
    <div class="screen" id="q4">
        <h2>Do I make your day better?</h2>
        <button onclick="saveAns('day','Yes','q5')">Yes</button>
        <button onclick="saveAns('day','No','q5')">No</button>
    </div>

    <!-- Q5: Expectations -->
    <div class="screen" id="q5">
        <h2>What do you expect from me?</h2>
        <label><input type="checkbox" value="Love"> Love</label>
        <label><input type="checkbox" value="Care"> Care</label>
        <label><input type="checkbox" value="Trust"> Trust</label>
        <label><input type="checkbox" value="Honesty"> Honesty</label>
        <label><input type="checkbox" value="Time"> Time</label>
        <label><input type="checkbox" value="Respect"> Respect</label>
        <button onclick="submitData()">Submit</button>
    </div>

    <!-- END SCREEN -->
    <div class="screen" id="end">
        <h2>💖 Thanks for playing!</h2>
        <p>Nothing entered was stored, it was just for fun 😄</p>
    </div>

</div>

<!-- CONFETTI -->
<canvas id="confetti"></canvas>

<script src="script.js"></script>
</body>
</html>
