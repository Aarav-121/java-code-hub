<!DOCTYPE html>
<html>
<head>
  <title>Fun Quiz with Leaderboard</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body { text-align:center; font-family:Arial; background:#ffe6f0; }
    button { display:block; margin:10px auto; padding:10px; background:#ff99cc; border:none; cursor:pointer; }
    #nextBtn { background:#ff4da6; color:white; }
    #timer { font-size:18px; margin-top:10px; }
    input { padding:8px; font-size:16px; margin:10px; }
    a { color:#ff4da6; text-decoration:none; font-weight:bold; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>

  <h1 style="color:#ff4da6;">💗 Fun Quiz 💗</h1>

  <!-- Start Screen -->
  <div id="startScreen">
    <p>Please enter your name to start the quiz:</p>
    <input type="text" id="playerName" placeholder="Your Name"/>
    <button onclick="startQuiz()">Start Quiz</button>
  </div>

  <!-- Quiz Screen (hidden until name entered) -->
  <div id="quizScreen" style="display:none;">
    <div id="timer"></div>
    <h2 id="question">Question here</h2>
    <div id="buttons"></div>
    <p id="result" style="font-size:20px;"></p>
    <p id="score" style="font-size:18px;"></p>
    <button id="nextBtn" onclick="nextQuestion()">Next</button>
  </div>

  <script>
    let current = 0;
    let score = 0;
    let timer;
    let timeLeft = 15;
    let player = "";

    const questions = [
      { q: "Capital of India?", correct: "Delhi", options: ["Mumbai", "Delhi", "Chennai"] },
      { q: "2 + 2 = ?", correct: "4", options: ["3", "4", "5"] },
      { q: "Which planet is known as the Red Planet?", correct: "Mars", options: ["Earth", "Mars", "Jupiter"] },
      { q: "What is the largest mammal?", correct: "Blue Whale", options: ["Elephant", "Giraffe", "Blue Whale"] },
      { q: "Who wrote 'Romeo and Juliet'?", correct: "William Shakespeare", options: ["William Shakespeare", "Charles Dickens", "Jane Austen"] },
      { q: "What is the chemical symbol for water?", correct: "H2O", options: ["O2", "H2O", "CO2"] },
      { q: "Which country is known as the Land of the Rising Sun?", correct: "Japan", options: ["China", "Japan", "South Korea"] },
      { q: "What is the smallest prime number?", correct: "2", options: ["1", "2", "3"] },
      { q: "Who painted the Mona Lisa?", correct: "Leonardo da Vinci", options: ["Pablo Picasso", "Leonardo da Vinci", "Vincent van Gogh"] },
      { q: "What is the largest ocean on Earth?", correct: "Pacific Ocean", options: ["Atlantic Ocean", "Indian Ocean", "Pacific Ocean"] },
      { q: "Which language is primarily spoken in Brazil?", correct: "Portuguese", options: ["Spanish", "Portuguese", "French"] },
      { q: "What is the currency of Japan?", correct: "Yen", options: ["Dollar", "Euro", "Yen"] }
    ];

    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const questionEl = document.getElementById("question");
    const buttonsEl = document.getElementById("buttons");
    const scoreEl = document.getElementById("score");
    const resultEl = document.getElementById("result");
    const timerEl = document.getElementById("timer");

    function startQuiz() {
      const nameInput = document.getElementById("playerName").value.trim();
      if(nameInput === "") { alert("Please enter your name!"); return; }
      player = nameInput;
      startScreen.style.display = "none";
      quizScreen.style.display = "block";
      loadQuestion();
    }

    function startTimer() {
      timeLeft = 15;
      timerEl.innerText = `⏱️ Time left: ${timeLeft}s`;
      clearInterval(timer);
      timer = setInterval(() => {
        timeLeft--;
        timerEl.innerText = `⏱️ Time left: ${timeLeft}s`;
        if(timeLeft <= 0) { clearInterval(timer); checkAnswer(null); }
      }, 1000);
    }

    function loadQuestion() {
      let q = questions[current];
      questionEl.innerText = q.q;
      buttonsEl.innerHTML = "";
      resultEl.innerText = "";
      startTimer();

      q.options.forEach(opt => {
        let btn = document.createElement("button");
        btn.innerText = opt;
        btn.onclick = () => checkAnswer(opt);
        buttonsEl.appendChild(btn);
      });
    }

    function checkAnswer(answer) {
      clearInterval(timer);
      let correct = questions[current].correct;
      let buttons = document.querySelectorAll("#buttons button");
      buttons.forEach(btn => btn.disabled = true);

      if(answer === correct) { resultEl.innerText = "✅ Correct!"; score++; }
      else { resultEl.innerText = `❌ Wrong! Correct: ${correct}`; }

      scoreEl.innerText = `Score: ${score}`;
    }

    function nextQuestion() {
      current++;
      if(current >= questions.length) showFinal();
      else loadQuestion();
    }

    function getRank(score, total) {
      let percent = (score / total) * 100;
      if(percent === 100) return "🏆 Genius";
      if(percent >= 80) return "🥇 Pro";
      if(percent >= 60) return "🥈 Smart";
      if(percent >= 40) return "🥉 Beginner";
      return "😅 Try Again";
    }

    function updateLeaderboard(name, score) {
      let leaderboard = JSON.parse(localStorage.getItem("leaderboard") || "[]");
      leaderboard.push({ name, score });
      leaderboard.sort((a,b) => b.score - a.score);
      leaderboard = leaderboard.slice(0,5); // top 5
      localStorage.setItem("leaderboard", JSON.stringify(leaderboard));
      return leaderboard;
    }

    function showFinal() {
      clearInterval(timer);
      let rank = getRank(score, questions.length);
      let top5 = updateLeaderboard(player, score);

      let leaderboardHTML = "<h3>🏆 Leaderboard (Top 5)</h3><ol>";
      top5.forEach(item => { leaderboardHTML += `<li>${item.name}: ${item.score}</li>`; });
      leaderboardHTML += "</ol>";

      document.body.innerHTML = `
        <h1 style="color:#ff4da6;">🎉 Quiz Finished 🎉</h1>
        <h2>${player}, Your Score: ${score}/${questions.length}</h2>
        <h2>Your Rank: ${rank}</h2>
        ${leaderboardHTML}

        <!-- Other Quizzes Section -->
        <div style="margin-top:30px;">
          <h3>✨ Check out my other quizzes! ✨</h3>
          <ul style="list-style:none; padding:0;">
            <li><a href="quiz1.html" target="_blank">Math Quiz</a></li>
            <li><a href="quiz2.html" target="_blank">Science Quiz</a></li>
            <li><a href="quiz3.html" target="_blank">History Quiz</a></li>
          </ul>
        </div>

        <button onclick="location.reload()" style="padding:10px; background:#ff4da6; color:white; border:none; margin-top:20px;">Restart</button>
      `;

      confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
    }

  </script>

</body>
</html>
